name: Tests
run-name: ${{ github.event.client_payload.is_pr == 'true' && format('(#{0}) - {1}', github.event.client_payload.pr_number, github.event.client_payload.pr_title) || 'Tests' }}

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build]

concurrency:
  group: tests-pr-${{ github.event.client_payload.pr_number || github.event.client_payload.ref }}
  cancel-in-progress: true

# Payload expected from caller:
# {
#   "ref": "<git sha to checkout>",
#   "base_sha": "<base sha for PR comparison, empty for non-PRs>",
#   "pr_number": "<PR number or empty>",
#   "pr_title": "<PR title or empty>",
#   "is_pr": "true/false",
#   "source_repo": "UKGovernmentBEIS/inspect_evals"
# }
#
# Fast checks (linting, type checking, package build, etc.) now run directly
# in the inspect_evals repository. This workflow only handles heavy test jobs
# that require larger runners.

env:
  HF_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

jobs:
  set-pending-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set pending commit status
        env:
          GH_TOKEN: ${{ secrets.INSPECT_EVALS_CHECKS_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.event.client_payload.source_repo }}/statuses/${{ github.event.client_payload.ref }} \
            -f state="pending" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Tests in progress..." \
            -f context="Tests (inspect-evals-actions)"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest-8-cores, windows-latest-8-cores]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      RUN_SLOW_TESTS: no
      RUN_DATASET_DOWNLOAD_TESTS: yes
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-${{ matrix.python-version }}-
            ${{ matrix.os }}-uv-

      - name: Cache Hugging Face datasets
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          # Keyed by OS (HF datasets are Python-version independent) and uv.lock
          # so a `datasets` bump invalidates the cache automatically.
          key: hf-datasets-${{ matrix.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies for python < 3.12
        if: ${{ matrix.python-version < '3.12' }}
        run: |
          uv sync --frozen --group dev --group test_py311_or_lower --group test

      - name: Install dependencies for python >= 3.12
        if: ${{ matrix.python-version >= '3.12' }}
        run: |
          uv sync --frozen --group dev --group test_py312_or_higher --group test

      - name: Run doctests
        run: |
          uv run pytest --doctest-modules --color=yes src/ \
            --ignore=src/inspect_evals/kernelbench \
            --ignore=src/inspect_evals/novelty_bench \
            --ignore=src/inspect_evals/livebench \
            --ignore=src/inspect_evals/mle_bench \
            --ignore=src/inspect_evals/cve_bench \
            --ignore=src/inspect_evals/bold \
            --ignore=src/inspect_evals/abstention_bench

      - name: Test with pytest
        run: |
          uv run pytest -n 2 -rA --color=yes --cov=inspect_evals --durations=50 --report-log=pytest-report.jsonl \
            --ignore=tests/kernelbench \
            --ignore=tests/novelty_bench \
            --ignore=tests/livebench \
            --ignore=tests/mle_bench \
            --ignore=tests/cve_bench \
            --ignore=tests/bold \
            --ignore=tests/abstention_bench

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pytest-report.jsonl

  slow-test-check:
    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download all pytest reports
        uses: actions/download-artifact@v4
        with:
          path: ./reports

      - name: Run slow test check
        shell: bash
        env:
          SLOW_TEST_REPORT_THRESHOLD: "10.0"
          SLOW_TEST_FAIL_THRESHOLD: "60.0"
        run: |
          python scripts/build/check_slow_tests.py --reports-dir ./reports

  clean-install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-${{ matrix.python-version }}-
            ${{ matrix.os }}-uv-

      - name: Install dependencies (locked), no extras
        run: |
          uv sync --frozen

      - name: Run a cli command that will expose registry import problems
        id: registry_check
        shell: bash
        run: |
          set +e  # Don't exit on error, we want to capture the output
          echo "::group::Running inspect eval command"
          echo "Command: uv run inspect eval inspect_evals/make_me_pay --limit=0"

          # Run the command and capture both stdout and stderr
          output=$(uv run inspect eval inspect_evals/make_me_pay --limit=0 2>&1)
          exit_code=$?

          echo "Exit code: $exit_code"
          echo "::endgroup::"

          echo "::group::Command output"
          if [ -z "$output" ]; then
            echo "(no output captured)"
          else
            echo "$output"
          fi
          echo "::endgroup::"

          # Check for error patterns in the output
          if echo "$output" | grep -q -E 'Unexpected exception loading entrypoints|No module named|ImportError|ModuleNotFoundError'; then
            echo "::error::Found import errors in the output. See 'Command output' group above for details."
            exit 1
          fi

          # Also check if no tasks were found, which could indicate a problem
          if echo "$output" | grep -q 'No inspect tasks were found'; then
            echo "::error::No inspect tasks were found, which might indicate a problem with the installation"
            exit 1
          fi

          # If the command itself failed, report that
          if [ $exit_code -ne 0 ]; then
            echo "::error::Command exited with code $exit_code. See 'Command output' group above for details."
            exit $exit_code
          fi

          echo "✓ Registry import check passed"

  targeted-slow-tests:
    name: Slow Tests relevant to PR
    if: github.event.client_payload.is_pr == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest-8-cores, windows-latest-8-cores]
    env:
      RUN_SLOW_TESTS: yes
      RUN_DATASET_DOWNLOAD_TESTS: yes
      UV_PYTHON: "3.12"

    steps:
      - uses: actions/checkout@v5
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref }}
          fetch-depth: 0

      - name: Determine base SHA for comparison
        id: base
        shell: bash
        run: |
          # Compute merge-base so the diff only reflects the PR's own
          # changes, not unrelated work merged into main since the branch point.
          BASE_REF="${{ github.event.client_payload.base_sha }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="origin/main"
          fi
          MERGE_BASE=$(git merge-base "$BASE_REF" HEAD)
          echo "sha=$MERGE_BASE" >> $GITHUB_OUTPUT
          echo "Using merge-base: $MERGE_BASE (base ref: $BASE_REF)"

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          base_sha: ${{ steps.base.outputs.sha }}
          files_yaml: |
            eval_src:
              - src/inspect_evals/**/*
            eval_tests:
              - tests/**/*

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Derive changed eval test paths
        id: collect
        shell: bash
        env:
          EVAL_SRC: ${{ steps.changed.outputs.eval_src_all_changed_files }}
          EVAL_TESTS: ${{ steps.changed.outputs.eval_tests_all_changed_files }}
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path

          # Read outputs (space/newline separated)
          src_files = os.environ.get('EVAL_SRC', '').split()
          test_files = os.environ.get('EVAL_TESTS', '').split()

          found: set[str] = set()

          def has_tests(dir_path: Path) -> bool:
              if not dir_path.is_dir():
                  return False
              # Look for pytest-style test files anywhere under the directory
              for f in dir_path.rglob('*.py'):
                  name = f.name
                  if name.startswith('test_') or name.endswith('_test.py'):
                      return True
              return False

          def maybe_add(eval_dir: str) -> None:
              p = Path('tests') / eval_dir
              if has_tests(p):
                  found.add(str(p))

          # From src changes -> tests/<eval>/
          for f in src_files:
              p = Path(f)
              # Skip README.md files
              if p.name.lower() == 'readme.md':
                  continue
              parts = p.parts
              if len(parts) >= 3 and parts[0] == 'src' and parts[1] == 'inspect_evals':
                  maybe_add(parts[2])

          # From tests changes -> tests/<eval>/
          for f in test_files:
              p = Path(f)
              # Skip README.md files
              if p.name.lower() == 'readme.md':
                  continue
              parts = p.parts
              if len(parts) >= 2 and parts[0] == 'tests':
                  maybe_add(parts[1])

          ISOLATED_EVALS = {
              'kernelbench', 'novelty_bench', 'livebench',
              'mle_bench', 'cve_bench', 'bold', 'abstention_bench',
          }

          isolated_envs: list[str] = []
          root_paths: list[str] = []
          for p in sorted(found):
              eval_name = Path(p).name
              if eval_name in ISOLATED_EVALS:
                  isolated_envs.append(eval_name)
              else:
                  root_paths.append(p)

          root_paths_str = ' '.join(root_paths)
          isolated_envs_str = ','.join(isolated_envs)

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'TEST_PATHS={root_paths_str}\n')
              env_file.write(f'ISOLATED_TOX_ENVS={isolated_envs_str}\n')

          if root_paths_str:
              print(f'Root env test paths: {root_paths_str}')
          if isolated_envs_str:
              print(f'Isolated eval tox environments: {isolated_envs_str}')
          if not root_paths_str and not isolated_envs_str:
              print('No eval test paths derived; skipping targeted slow run.')
          PY

      - name: Cache uv downloads
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-3.12-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-3.12-
            ${{ matrix.os }}-uv-

      - name: Install dependencies
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        run: |
          uv sync --frozen --group dev --group test_py312_or_higher --group test

      - name: Check for slow tests in derived paths
        id: check_slow
        shell: bash
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path

          ISOLATED_EVALS = {
              'kernelbench', 'novelty_bench', 'livebench',
              'mle_bench', 'cve_bench', 'bold', 'abstention_bench',
          }

          def scan_for_slow(paths: list[str]) -> bool:
              for path_str in paths:
                  path = Path(path_str)
                  if not path.exists():
                      continue
                  for f in path.rglob("*.py"):
                      name = f.name
                      if name.startswith("test_") or name.endswith("_test.py"):
                          try:
                              text = f.read_text(encoding='utf-8')
                              if '@pytest.mark.slow' in text:
                                  print(f'Found slow tests in: {f}')
                                  return True
                          except Exception:
                              pass
              return False

          root_paths = os.environ.get('TEST_PATHS', '').split()
          isolated_envs = [e for e in os.environ.get('ISOLATED_TOX_ENVS', '').split(',') if e]
          isolated_paths = [str(Path('tests') / e) for e in isolated_envs]

          has_slow = scan_for_slow(root_paths)
          has_isolated_slow = scan_for_slow(isolated_paths)

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'HAS_SLOW_TESTS={str(has_slow).lower()}\n')
              env_file.write(f'HAS_ISOLATED_SLOW_TESTS={str(has_isolated_slow).lower()}\n')

          if has_slow:
              print('Slow tests detected in root paths - will run targeted pytest suite.')
          if has_isolated_slow:
              print('Slow tests detected in isolated evals - will run targeted tox suite.')
          if not has_slow and not has_isolated_slow:
              print('No slow tests found in changed paths - skipping targeted runs.')
          PY

      - name: Free disk space (before targeted run)
        if: env.HAS_SLOW_TESTS == 'true' && runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false # keep python and tools installed by setup-uv/setup-python
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Run targeted tests
        if: env.HAS_SLOW_TESTS == 'true'
        shell: bash
        run: |
          uv run pytest -n 2 -rA --color=yes --durations=50 --suppress-no-test-exit-code $TEST_PATHS

      - name: Install tox and tox-uv (for isolated eval slow tests)
        if: env.HAS_ISOLATED_SLOW_TESTS == 'true' && runner.os == 'Linux'
        run: pip install tox tox-uv

      - name: Run targeted isolated eval slow tests via tox
        if: env.HAS_ISOLATED_SLOW_TESTS == 'true' && runner.os == 'Linux'
        run: tox -e ${{ env.ISOLATED_TOX_ENVS }}


  tox-isolated-evals:
    name: Isolated eval tests (tox)
    runs-on: ubuntu-latest-8-cores
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v5
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install tox and tox-uv
        run: pip install tox tox-uv

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-3.12-isolated-${{ hashFiles('packages/*/uv.lock', 'packages/*/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-3.12-isolated-
            ${{ runner.os }}-uv-3.12-

      - name: Run isolated eval tests via tox
        run: tox -e kernelbench,novelty_bench,livebench,mle_bench,cve_bench,bold,abstention_bench

  report-status:
    runs-on: ubuntu-latest
    needs:
      - set-pending-status
      - test
      - slow-test-check
      - clean-install-test
      - targeted-slow-tests
      - tox-isolated-evals
    if: always()
    steps:
      - name: Determine overall status
        id: status
        run: |
          # Check if any required job failed (excluding set-pending-status which we need to succeed)
          needs_json='${{ toJSON(needs) }}'

          # Parse results, skipping set-pending-status and skipped jobs
          failed=false
          for job in $(echo "$needs_json" | jq -r 'to_entries[] | select(.key != "set-pending-status") | select(.value.result != "skipped") | .key + ":" + .value.result'); do
            result="${job#*:}"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              failed=true
              break
            fi
          done

          if [ "$failed" = "true" ]; then
            echo "state=failure" >> $GITHUB_OUTPUT
            echo "description=Tests failed" >> $GITHUB_OUTPUT
          else
            echo "state=success" >> $GITHUB_OUTPUT
            echo "description=Tests succeeded" >> $GITHUB_OUTPUT
          fi

      - name: Update commit status
        env:
          GH_TOKEN: ${{ secrets.INSPECT_EVALS_CHECKS_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.event.client_payload.source_repo }}/statuses/${{ github.event.client_payload.ref }} \
            -f state="${{ steps.status.outputs.state }}" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="${{ steps.status.outputs.description }}" \
            -f context="Tests (inspect-evals-actions)"

